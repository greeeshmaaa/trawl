<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trawl — Control Panel</title>
<style>
  :root { --bg:#0f1115; --panel:#181b22; --line:#2a2f3a; --fg:#e6e9ef; --muted:#8b93a3; --accent:#5b9dff; --good:#3ecf8e; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--fg); font:15px/1.5 -apple-system,Segoe UI,Roboto,sans-serif; }
  .wrap { max-width:760px; margin:0 auto; padding:40px 20px; }
  h1 { font-size:24px; margin:0 0 4px; }
  .sub { color:var(--muted); margin:0 0 28px; }
  .card { background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:22px; margin-bottom:20px; }
  label { display:block; font-size:13px; color:var(--muted); margin:0 0 6px; }
  input { width:100%; background:#0c0e12; border:1px solid var(--line); color:var(--fg); border-radius:8px; padding:10px 12px; font-size:14px; }
  .row { display:flex; gap:14px; }
  .row > div { flex:1; }
  button { margin-top:18px; background:var(--accent); color:#fff; border:0; border-radius:8px; padding:11px 18px; font-size:15px; font-weight:600; cursor:pointer; }
  button:disabled { opacity:.5; cursor:default; }
  .stats { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; }
  .stat { text-align:center; padding:16px 8px; background:#0c0e12; border:1px solid var(--line); border-radius:10px; }
  .stat .n { font-size:28px; font-weight:700; font-variant-numeric:tabular-nums; }
  .stat .l { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; margin-top:4px; }
  .runline { color:var(--muted); font-size:13px; margin-top:14px; min-height:18px; }
  .runline b { color:var(--good); font-family:ui-monospace,monospace; }
  .dot { display:inline-block; width:8px; height:8px; border-radius:50%; background:var(--muted); margin-right:7px; vertical-align:middle; }
  .dot.live { background:var(--good); }
</style>
</head>
<body>
<div class="wrap">
  <h1>Trawl</h1>
  <p class="sub">Distributed web crawler — launch workers on AWS Fargate and watch them coordinate.</p>

  <div class="card">
    <div class="row">
      <div style="flex:2">
        <label>Seed URL</label>
        <input id="seed" value="https://books.toscrape.com/">
      </div>
      <div>
        <label>Max pages (per worker)</label>
        <input id="maxPages" type="number" value="200" min="1">
      </div>
      <div>
        <label>Workers</label>
        <input id="workers" type="number" value="2" min="1" max="5">
      </div>
    </div>
    <button id="go" onclick="start()">Start crawl</button>
    <div class="runline" id="runline"></div>
  </div>

  <div class="card">
    <div style="margin-bottom:14px"><span class="dot" id="dot"></span><span id="state" style="color:var(--muted);font-size:13px">idle</span></div>
    <div class="stats">
      <div class="stat"><div class="n" id="queued">0</div><div class="l">Queued</div></div>
      <div class="stat"><div class="n" id="inFlight">0</div><div class="l">In flight</div></div>
      <div class="stat"><div class="n" id="discovered">0</div><div class="l">Discovered</div></div>
      <div class="stat"><div class="n" id="runningTasks">0</div><div class="l">Workers</div></div>
    </div>
  </div>
</div>

<script>
async function start() {
  var btn = document.getElementById('go');
  btn.disabled = true;
  var body = {
    seed: document.getElementById('seed').value,
    maxPages: parseInt(document.getElementById('maxPages').value) || 200,
    workers: parseInt(document.getElementById('workers').value) || 2
  };
  try {
    var res = await fetch('/api/crawls', {
      method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)
    });
    var data = await res.json();
    document.getElementById('runline').innerHTML =
      'Launched run <b>' + data.runId + '</b> — ' + data.workers + ' worker(s) on seed ' + data.seed;
  } catch (e) {
    document.getElementById('runline').textContent = 'Failed to start: ' + e;
  }
  btn.disabled = false;
}

async function poll() {
  try {
    var res = await fetch('/api/status');
    var s = await res.json();
    var keys = ['queued','inFlight','discovered','runningTasks'];
    for (var i = 0; i < keys.length; i++) {
      document.getElementById(keys[i]).textContent = s[keys[i]];
    }
    var live = s.runningTasks > 0 || s.queued > 0 || s.inFlight > 0;
    document.getElementById('dot').className = 'dot' + (live ? ' live' : '');
    document.getElementById('state').textContent =
      s.runningTasks > 0 ? (s.runningTasks + ' worker(s) crawling') : 'idle';
  } catch (e) {}
}
setInterval(poll, 2000);
poll();
</script>
</body>
</html>
